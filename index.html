<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autism Detection System</title>
    <style>
      /* Custom loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loading-content {
        text-align: center;
        color: white;
      }
      
      .loading-icon {
        width: 60px;
        height: 60px;
        margin: 0 auto 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      
      .loading-text {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      
      .loading-subtitle {
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9.5 2C5.91 2 3 4.91 3 8.5C3 12.09 5.91 15 9.5 15S16 12.09 16 8.5C16 4.91 13.09 2 9.5 2Z"/>
            <path d="M9.5 7a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z"/>
            <path d="M14.5 10c0 1.5-2.5 3-5 3s-5-1.5-5-3"/>
            <path d="M12 2v4m0 4v4m4-8h4m-4 0h-4"/>
          </svg>
        </div>
        <div class="loading-text">Autism Detection System</div>
        <div class="loading-subtitle">Clinical Screening Platform</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
